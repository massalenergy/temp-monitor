<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0e1a">
  <meta http-equiv="refresh" content="10">
  <title>🌡️ 온습도 모니터</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0e1a;--card:#111827;--card-border:#1e293b;--accent-temp:#f97316;--accent-humid:#06b6d4;--text:#f1f5f9;--text-dim:#94a3b8;--green:#22c55e;--red:#ef4444}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    .app{max-width:480px;margin:0 auto;padding:20px 16px;min-height:100vh}
    .header{text-align:center;margin-bottom:24px}
    .header h1{font-size:1.4rem;font-weight:700;letter-spacing:-.5px}
    .header .subtitle{font-size:.8rem;color:var(--text-dim);margin-top:4px}
    .status-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;font-size:.75rem;color:var(--text-dim)}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    .widget-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .widget{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:20px 16px;text-align:center;position:relative;overflow:hidden}
    .widget::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .widget.temp::before{background:linear-gradient(90deg,#f97316,#ef4444)}
    .widget.humid::before{background:linear-gradient(90deg,#06b6d4,#3b82f6)}
    .widget-label{font-size:.75rem;color:var(--text-dim);margin-bottom:8px;font-weight:600;letter-spacing:1px}
    .widget-value{font-size:2.8rem;font-weight:900;line-height:1;margin-bottom:4px}
    .widget.temp .widget-value{color:var(--accent-temp)}
    .widget.humid .widget-value{color:var(--accent-humid)}
    .widget-unit{font-size:1rem;font-weight:400;opacity:.7}
    .section{margin-bottom:20px}
    .section h2{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--text-dim)}
    .sheet-frame{background:var(--card);border:1px solid var(--card-border);border-radius:16px;overflow:hidden}
    .sheet-frame iframe{width:100%;height:500px;border:none;display:block}
    .chart-frame{background:var(--card);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;padding:8px;text-align:center}
    .chart-frame img{max-width:100%;height:auto;border-radius:8px}
    .refresh-btn{display:block;width:100%;padding:12px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:600;margin-bottom:16px}
    .refresh-btn:hover{border-color:var(--accent-temp);color:var(--accent-temp)}
    .info-box{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px;font-size:.75rem;color:var(--text-dim);line-height:1.6}
    .info-box strong{color:var(--text)}
    .info-box a{color:var(--accent-humid);text-decoration:none}
    .footer{text-align:center;margin-top:24px;font-size:.7rem;color:var(--text-dim)}
    @media(max-width:360px){.widget-value{font-size:2.2rem}}
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🌡️ 온습도 모니터</h1>
      <div class="subtitle">Google Sheets 실시간 연동 · 10초 자동 갱신</div>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span id="statusText">실시간 연결됨</span>
    </div>

    <!-- 최신 온습도 차트 (구글시트 이미지 - CORS 무관) -->
    <div class="widget-grid">
      <div class="widget temp">
        <div class="widget-label">🌡️ 온도</div>
        <div class="widget-value" id="tempValue">--<span class="widget-unit">°C</span></div>
      </div>
      <div class="widget humid">
        <div class="widget-label">💧 습도</div>
        <div class="widget-value" id="humidValue">--<span class="widget-unit">%</span></div>
      </div>
    </div>

    <button class="refresh-btn" onclick="location.reload()">🔄 데이터 새로고침 (10초마다 자동)</button>

    <!-- 온도 차트 -->
    <div class="section">
      <h2>📈 온도 변화</h2>
      <div class="chart-frame">
        <img id="tempChart" alt="온도 차트" src="">
      </div>
    </div>

    <!-- 습도 차트 -->
    <div class="section">
      <h2>📈 습도 변화</h2>
      <div class="chart-frame">
        <img id="humidChart" alt="습도 차트" src="">
      </div>
    </div>

    <!-- 구글시트 원본 데이터 (iframe) -->
    <div class="section">
      <h2>📊 원본 데이터</h2>
      <div class="sheet-frame">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRz0MVUL2faA0qmQFJ2aq<LMgjPdwunifu9cZGhp/pubhtml?gid=0&single=true&widget=true&headers=false" loading="lazy"></iframe>
      </div>
    </div>

    <div class="info-box">
      <strong>⚡ 실시간 업데이트:</strong> 이 페이지는 10초마다 자동 새로고침됩니다.<br>
      <strong>⏰ 시간 표기:</strong> 원본 시간 +16시간 적용<br>
      <strong>📱 바탕화면 위젯:</strong> 모바일 브라우저에서 "홈 화면에 추가"<br>
      <strong>🔗 배포:</strong> 이 파일을 GitHub Pages에 올리면 영구 URL 생성
    </div>

    <div class="footer">
      <span id="lastUpdate"></span>
    </div>
  </div>

  <script>
    var SHEET_ID = '1X1kf9WwHaV1I1apmBNWig-TtqNjBnEMY_t08iKna404';
    var HOUR_OFFSET = 16;

    // ===== Google Sheets 이미지 차트 URL 생성 =====
    function updateCharts() {
      var base = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?';
      var params = 'tqx=out:png&size=600x250&transparent=false&bgColor=%23111827';

      // 온도 차트: B열
      var tempUrl = base + params + '&gid=0&range=A:B&chco=f97316&chtt=Temperature';
      document.getElementById('tempChart').src = tempUrl + '&t=' + Date.now();

      // 습도 차트: C열
      var humidUrl = base + params + '&gid=0&range=A:C&chco=06b6d4&chtt=Humidity';
      document.getElementById('humidChart').src = hidUrl + '&t=' + Date.now();
    }

    // ===== 한국 날짜 파싱 =====
    function parseKoreanDate(str) {
      str = (str||'').trim();
      var m = str.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\s+(오전|오후)\s+(\d{1,2}):(\d{2}):(\d{2})/);
      if (!m) return null;
      var h = parseInt(m[5]);
      if (m[4]==='오후' && h!==12) h+=12;
      if (m[4]==='오전' && h===12) h=0;
      return new Date(+m[1], +m[2]-1, +m[3], h, +m[6], +m[7]);
    }

    function addH(d,h){ return new Date(d.getTime()+h*36e5); }

    function fmt(d){
      var mo=d.getMonth()+1,da=d.getDate(),h=d.getHours(),mi=('0'+d.getMinutes()).slice(-2),s=('0'+d.getSeconds()).slice(-2);
      var ap=h<12?'오전':'오후',h12=h%12||12;
      return mo+'월 '+da+'일 '+ap+' '+h12+':'+mi+':'+s;
    }

    // ===== 3가지 방법으로 데이터 fetch =====
    function fetchCSV(url, cb) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.timeout = 8000;
      xhr.onload = function() { cb(xhr.status===200 ? null : new Error(xhr.status), xhr.responseText); };
      xhr.onerror = function() { cb(new Error('network')); };
      xhr.ontimeout = function() { cb(new Error('timeout')); };
      xhr.send();
    }

    function parseCSVRows(text) {
      var lines = text.trim().split('\n');
      var rows = [];
      for(var i=0;i<lines.length;i++){
        var p=lines[i].split(',');
        if(p.length<3)continue;
        var t=parseFloat(p[1]),h=parseFloat(p[2]);
        if(isNaN(t)||isNaN(h))continue;
        var d=parseKoreanDate(p[0]);
        if(!d)continue;
        rows.push({adjustedTime:addH(d,HOUR_OFFSET),temp:t,humid:h});
      }
      return rows;
    }

    function updateWidgets(rows) {
      if(!rows||!rows.length) return;
      rows.sort(function(a,b){return b.adjustedTime-a.adjustedTime});
      var valid=rows.filter(function(r){return r.temp!==0||r.humid!==0});
      var latest=valid.length?valid[0]:rows[0];
      document.getElementById('tempValue').innerHTML=latest.temp+'<span class="widget-unit">°C</span>';
      document.getElementById('humidValue').innerHTML=latest.humid+'<span class="widget-unit">%</span>';
      document.getElementById('statusText').textContent='실시간 연결됨 · '+fmt(latest.adjustedTime);
    }

    // 방법1: CORS 프록시 (file:// 에서도 동작)
    var proxies = [
      'https://corsproxy.io/?',
      'https://api.allorigins.win/raw?url='
    ];

    function tryProxies(idx) {
      if(idx >= proxies.length) {
        // 방법2: 직접 fetch (GitHub Pages에서 동작)
        fetchCSV('https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&t='+Date.now(), function(err, text) {
          if(!err && text && text.length > 10) {
            updateWidgets(parseCSVRows(text));
          } else {
            document.getElementById('statusText').textContent = '데이터 대기 중... (새로고침 버튼 클릭)';
          }
        });
        return;
      }
      var csvUrl = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv';
      var url = proxies[idx] + encodeURIComponent(csvUrl) + '&t=' + Date.now();
      fetchCSV(url, function(err, text) {
        if(!err && text && text.length > 10 && text.indexOf('20') === 0) {
          updateWidgets(parseCSVRows(text));
        } else {
          tryProxies(idx + 1);
        }
      });
    }

    // ===== 시작 =====
    tryProxies(0);

    // 마지막 업데이트 시간
    var now = new Date();
    document.getElementById('lastUpdate').textContent =
      '마지막 갱신: ' + now.getHours() + ':' + ('0'+now.getMinutes()).slice(-2) + ':' + ('0'+now.getSeconds()).slice(-2);
  </script>
</body>
</html>
